<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="icon" href="form.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f4f8;
            min-height: 100vh;
            padding: 16px;
        }

        .all {
            background-color: lightblue;
            width: 90%;
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            text-transform: capitalize;
            background-color: #0f00a3;
            color: white;
            padding: 12px;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
        }

        /* Image floats right on large, hidden on small */
        .hero-img {
            float: right;
            width: clamp(100px, 18vw, 180px);
            margin: 0 0 12px 16px;
            display: block;
        }

        @media (max-width: 520px) {
            .hero-img { display: none; }
        }

        form {
            border-top: solid 5px #0f00a3;
            border-bottom: solid 5px #0f00a3;
            padding: 16px 0;
            overflow: hidden;
        }

        /* Each label + input row */
        .field-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        form label {
            display: inline-block;
            width: 120px;
            flex-shrink: 0;
            font-weight: 600;
            font-size: 0.95rem;
        }

        #txt, #mail, #pass, #num, #add {
            flex: 1 1 180px;
            height: 34px;
            border: solid white 2px;
            border-left: solid black 2px;
            transition: transform 0.4s, border 0.3s;
            background-color: white;
            color: black;
            padding: 0 8px;
            font-size: 1rem;
            min-width: 0;
        }

        #txt:focus, #mail:focus, #pass:focus, #num:focus, #add:focus {
            outline: none;
            transform: scale(1.04);
            border: 2px black solid;
        }

        /* Radio group */
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 32px;
            margin-bottom: 14px;
            align-items: center;
        }

        .radio-group label {
            width: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn {
            flex: 1 1 120px;
            height: 42px;
            font-size: 1rem;
            border: solid white 2px;
            border-left: solid black 2px;
            background: transparent;
            cursor: pointer;
            transition: background 0.4s, color 0.3s;
        }

        .btn:hover, .btn:focus {
            background-color: #0f00a3;
            color: white;
            border: white solid 2px;
            outline: none;
            transition-duration: 0.5s;
        }

        @media (max-width: 400px) {
            form label { width: 100px; font-size: 0.88rem; }
            .btn       { font-size: 0.9rem; height: 38px; }
        }
    </style>
</head>
<body>
    <div class="all">
        <h1>Enter Your Data</h1>
        <form onsubmit="return false;">
            <img class="hero-img" src="form picture.png" alt="Company Picture">

            <div class="field-row">
                <label for="txt">Your Name</label>
                <input id="txt" type="text">
            </div>

            <div class="field-row">
                <label for="mail">E-Mail</label>
                <input id="mail" type="email">
            </div>

            <div class="field-row">
                <label for="pass">Password</label>
                <input id="pass" type="password">
            </div>

            <div class="field-row">
                <label for="num">Phone Number</label>
                <input id="num" type="tel">
            </div>

            <div class="field-row">
                <label for="add">Address</label>
                <input id="add" type="text">
            </div>

            <div class="radio-group">
                <label><input type="radio" name="gender"> Male</label>
                <label><input type="radio" name="gender"> Female</label>
            </div>

            <div class="radio-group">
                <label><input type="radio" name="status"> Married</label>
                <label><input type="radio" name="status"> Not Married</label>
            </div>

            <div class="btn-row">
                <input onclick="playSound()" type="submit" value="Done"  class="btn">
                <input onclick="playSound()" type="reset"  value="Reset" class="btn">
            </div>
        </form>
    </div>

    <script>
        const addSound = new Audio("click.mp3");
        function playSound() { addSound.play(); addSound.currentTime = 0; }
    </script>
</body>
</html>
